<div
  class="bg-linear-to-br from-gray-900 via-slate-800 to-black min-h-screen flex items-center justify-center p-4"
>
  <div
    class="max-w-md w-full bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl text-white"
  >
    <!-- TITULO -->
    <div class="text-center mb-8">
      <h1
        class="text-3xl font-bold bg-clip-text text-transparent bg-linear-to-r from-indigo-400 to-cyan-400"
      >
        Crear una cuenta
      </h1>
    </div>

    <!-- FORMULARIO -->
    <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- Nombre -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-300 mb-2"
          >Nombre de Usuario</label
        >
        <input
          type="text"
          class="w-full mb-1 px-4 py-3 bg-gray-900/50 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all text-white placeholder-gray-600"
          placeholder="usuario"
          formControlName="name"
        />

        <shared-form-msg-error [form]="registerForm" fieldName="name" />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-2"
          >Correo Electrónico</label
        >
        <input
          type="email"
          class="w-full mb-1 px-4 py-3 bg-gray-900/50 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all text-white placeholder-gray-600"
          placeholder="usuario@dominio.es"
          formControlName="email"
        />

        <shared-form-msg-error [form]="registerForm" fieldName="email" />
      </div>

      <!-- Clave -->
      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-300 mb-2"
          >Contraseña</label
        >
        <input
          type="password"
          class="w-full mb-1 px-4 py-3 bg-gray-900/50 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all text-white placeholder-gray-600"
          placeholder="••••••••"
          formControlName="password"
        />

        <shared-form-msg-error [form]="registerForm" fieldName="password" />
      </div>

      <!-- Btn submit -->
      <button
        type="submit"
        class="w-full cursor-pointer flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-linear-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 focus:ring-offset-gray-900 transition-all duration-300 transform hover:-translate-y-1"
      >
        Registrarse
      </button>
    </form>

    <!-- ENLACE LOGIN -->
    <p class="mt-8 text-center text-sm text-gray-500">
      ¿Estas registrado?
      <a
        routerLink="/auth/login"
        class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors ml-1"
        >Inicia sesión</a
      >
    </p>
  </div>
</div>
